name: Codex PR review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-review:
    if: >-
      ${{
        !github.event.pull_request.draft &&
        contains(
          fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'),
          github.event.pull_request.author_association
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Request a SHA-pinned Codex review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const marker = `<!-- codex-auto-review:${sha} -->`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              },
            );

            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.info(`Codex review already requested for ${sha}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '@codex review',
                '',
                `Review the complete pull request at head commit \`${sha}\`.`,
                'Follow the repository review instructions in `AGENTS.md` and pin the verdict to this full SHA.',
                '',
                marker,
              ].join('\n'),
            });
