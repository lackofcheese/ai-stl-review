name: Claude auto PR review

# Automatically runs a Claude review agent on every new or updated pull
# request. Setup: add a CLAUDE_CODE_OAUTH_TOKEN repository secret (Pro/Max
# subscribers generate one locally with `claude setup-token`).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel a superseded run when a new commit is pushed to the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and PRs opened by bots.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the automatic first-pass reviewer for this pull request.
            The PR branch is already checked out in the working directory. This
            repository publishes the review site (HTML/CSS/JS pages, the shared
            content-addressed assets/ store, and reviews.json) to GitHub Pages.

            Read any README.md at the repo root first, then review the diff for:
            - Correctness of page/site changes and valid JSON (reviews.json,
              manifests) — flag anything that would break the published site
            - Broken links, missing/duplicated asset references, and index/nav
              consistency across pages
            - Adherence to the site's structure and styling conventions
            - Security implications (never surface secrets)

            Post your feedback ON GitHub, not as chat text:
            - Use `gh pr comment` for the top-level summary.
            - Use `mcp__github_inline_comment__create_inline_comment` (with
              `confirmed: true`) for specific line-level issues.

            Start the top-level comment with a one-line verdict and end it with
            the attribution line `AI reviewer: Claude Code (auto-review)`. This
            is an advisory first-pass review only: do NOT approve, and do NOT
            merge — merging is always a separate, explicit human action.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
