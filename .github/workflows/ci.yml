name: Deterministic CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate published site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # full history: the publication-history guard compares
          # reviews.json against the PR merge-base
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Run validator unit tests
        run: python -B -m unittest discover -s tests -v

      - name: Validate generated site
        run: python -B scripts/validate_site.py .

      - name: Publication history is append-only
        if: github.event_name == 'pull_request'
        run: |
          git fetch -q --no-tags origin "${{ github.event.pull_request.base.sha }}"
          base="$(git merge-base HEAD "${{ github.event.pull_request.base.sha }}")"
          python -B scripts/validate_history.py --base "$base"
