name: Claude auto PR review

# Automatically runs a Claude review agent on every new or updated pull
# request. Setup: add a CLAUDE_CODE_OAUTH_TOKEN repository secret (Pro/Max
# subscribers generate one locally with `claude setup-token`).
#
# If the secret is absent (including fork PRs, where secrets are not exposed),
# the job skips the review and finishes green instead of failing — the action
# requires an auth credential and would otherwise error on an empty token.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel a superseded run when a new commit is pushed to the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and PRs opened by bots.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      # Required: claude-code-action exchanges this OIDC token for a GitHub
      # App token to authenticate as the Claude GitHub App when posting.
      id-token: write
    steps:
      # Secrets can't be referenced in a job-level `if:`, so gate here: an
      # empty token (secret unset, or a fork PR) skips the review cleanly.
      - name: Check for Claude credentials
        id: creds
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not set — skipping Claude auto-review."
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.present == 'true'
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        if: steps.creds.outputs.present == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the automatic first-pass reviewer for this pull request.
            The PR branch is already checked out in the working directory. This
            repository publishes the review site (HTML/CSS/JS pages, the shared
            content-addressed assets/ store, and reviews.json) to GitHub Pages.

            Read any README.md at the repo root first, then review the diff for:
            - Correctness of page/site changes and valid JSON (reviews.json,
              manifests) — flag anything that would break the published site
            - Broken links, missing/duplicated asset references, and index/nav
              consistency across pages
            - Adherence to the site's structure and styling conventions
            - Security implications (never surface secrets)

            Post your feedback ON GitHub, not as chat text:
            - Use `gh pr comment` for the top-level summary.
            - Use `mcp__github_inline_comment__create_inline_comment` (with
              `confirmed: true`) for specific line-level issues.

            Start the top-level comment with a one-line verdict and end it with
            the attribution line `AI reviewer: Claude Code (auto-review)` —
            append the exact model name if it is available to you. This is an
            advisory first-pass review only: do NOT approve, and do NOT merge —
            merging is always a separate, explicit human action.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
